name: Movement & Intelligence
on:
  schedule:
    - cron: '41 7  * * 1-5'   # 08:41 CET
    - cron: '42 9  * * 1-5'   # 10:42 CET
    - cron: '41 11 * * 1-5'   # 12:41 CET
    - cron: '41 14 * * 1-5'   # 15:41 CET
    - cron: '41 17 * * 1-5'   # 18:41 CET
    # Summer CEST (UTC+2): subtract 1 hour from each
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install requests yfinance
      - name: Run movement check
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          DIGEST_MODE:    "movement"
        run: python scripts/price_digest.py
      - name: Run intelligence check
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python scripts/intelligence.py
      - name: Commit data
        run: |
          git config user.name  "Portfolio Bot"
          git config user.email "portfolio-bot@users.noreply.github.com"
          git add docs/data/ portfolio_config.json
          git diff --staged --quiet || git commit -m "[CHECK] Movement + Intelligence $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
