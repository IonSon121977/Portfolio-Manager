name: Fundamentals Update (every 2h, 08-18 CET)
on:
  schedule:
    - cron: '04 7 * * 1-5'   # 08:00 CET (UTC+1)
    - cron: '04 9 * * 1-5'   # 10:00 CET
    - cron: '04 11 * * 1-5'  # 12:00 CET
    - cron: '04 13 * * 1-5'  # 14:00 CET
    - cron: '04 15 * * 1-5'  # 16:00 CET
    - cron: '04 17 * * 1-5'  # 18:00 CET
    # Summer CEST (UTC+2): subtract 1 hour from each UTC value
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  fundamentals:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install requests yfinance
      - name: Run fundamentals
        run: python scripts/fundamentals.py
      - name: Run market sentiment
        run: python scripts/market_sentiment.py
      - name: Commit fundamentals
        run: |
          git config user.name  "Portfolio Bot"
          git config user.email "portfolio-bot@users.noreply.github.com"
          git add docs/data/fundamentals.json
          git diff --staged --quiet || git commit -m "[FUND] Fundamentals update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
